<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart QR Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .main-card{
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            color: white;
        }

        .title{
            font-size: 38px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle{
            text-align: center;
            color: #cbd5e1;
            margin-bottom: 35px;
        }

        .form-control{
            height: 60px;
            border-radius: 15px;
            border: none;
            padding-left: 20px;
            font-size: 16px;
            background: rgba(255,255,255,0.12);
            color: white;
        }

        .form-control::placeholder{
            color: #cbd5e1;
        }

        .form-control:focus{
            box-shadow: none;
            background: rgba(255,255,255,0.18);
            color: white;
        }

        .generate-btn{
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            transition: 0.3s;
        }

        .generate-btn:hover{
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .qr-box{
            margin-top: 35px;
            text-align: center;
        }

        .qr-box img{
            width: 260px;
            padding: 15px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .download-btn{
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            background: #22c55e;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .download-btn:hover{
            background: #16a34a;
        }
    </style>
</head>
<body>

<div class="main-card">

    <div class="title">
        Smart QR Generator
    </div>

    <div class="subtitle">
        Create beautiful QR codes instantly 🚀
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
            <input
                type="text"
                name="qr_text"
                class="form-control"
                placeholder="Enter text or URL..."
                required
            >
        </div>

        <button class="generate-btn">
            Generate QR Code
        </button>
        <button type="button" class="copy-btn" onclick="copyText()">
            Copy Text
        </button>
    </form>

    {% if qr %}
    <div class="qr-box">
        <img src="{{ qr }}" alt="QR Code">

        <br>

        <a href="{{ qr }}" download class="download-btn">
            Download QR
        </a>
    </div>
    {% endif %}

</div>

</body>
</html>
