<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart QR Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            min-height: 100vh;
            overflow-x: hidden;
            background:
                    radial-gradient(circle at top left, #2563eb 0%, transparent 25%),
                    radial-gradient(circle at bottom right, #7c3aed 0%, transparent 25%),
                    linear-gradient(135deg, #020617, #0f172a, #111827);

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* Animated Blobs */

        .blob{
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }

        .blob1{
            width: 350px;
            height: 350px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
        }

        .blob2{
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            bottom: -80px;
            right: -80px;
            animation-delay: 2s;
        }

        @keyframes float{
            0%{
                transform: translateY(0px);
            }
            50%{
                transform: translateY(25px);
            }
            100%{
                transform: translateY(0px);
            }
        }

        /* Card */

        .main-card{
            width: 100%;
            max-width: 650px;

            background: rgba(255,255,255,0.08);

            border: 1px solid rgba(255,255,255,0.1);

            backdrop-filter: blur(18px);

            border-radius: 35px;

            padding: 45px;

            box-shadow:
                    0 10px 50px rgba(0,0,0,0.5),
                    inset 0 0 20px rgba(255,255,255,0.04);

            position: relative;
            z-index: 2;
        }

        .badge-top{
            width: fit-content;
            margin: auto;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .title{
            text-align: center;
            font-size: 55px;
            font-weight: 800;
            line-height: 1.1;

            background: linear-gradient(to right, #ffffff, #60a5fa, #a78bfa);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            margin-bottom: 15px;
        }

        .subtitle{
            text-align: center;
            color: #94a3b8;
            font-size: 17px;
            margin-bottom: 40px;
        }

        .input-group-custom{
            position: relative;
        }

        .input-icon{
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
        }

        .form-control{
            height: 68px;
            border-radius: 20px !important;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.08);
            color: white;
            padding-left: 55px;
            font-size: 17px;
        }

        .form-control::placeholder{
            color: #94a3b8;
        }

        .form-control:focus{
            background: rgba(255,255,255,0.12);
            color: white;
            box-shadow: 0 0 25px rgba(59,130,246,0.3);
            border-color: #3b82f6;
        }

        .btn-custom{
            width: 100%;
            height: 62px;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            transition: 0.3s;
        }

        .generate-btn{
            margin-top: 22px;
            background: linear-gradient(135deg, #06b6d4, #2563eb);
            color: white;
            box-shadow: 0 10px 25px rgba(37,99,235,0.35);
        }

        .copy-btn{
            margin-top: 15px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
            box-shadow: 0 10px 25px rgba(139,92,246,0.35);
        }

        .btn-custom:hover{
            transform: translateY(-3px) scale(1.01);
        }

        /* QR Section */

        .qr-box{
            margin-top: 40px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn{
            from{
                opacity: 0;
                transform: translateY(20px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }

        .qr-wrapper{
            width: fit-content;
            margin: auto;
            padding: 18px;
            border-radius: 30px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .qr-box img{
            width: 280px;
            border-radius: 20px;
            background: white;
            padding: 12px;
        }

        .download-btn{
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 28px;
            padding: 15px 30px;
            border-radius: 16px;
            text-decoration: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(34,197,94,0.35);
        }

        .download-btn:hover{
            transform: translateY(-3px);
        }

        .features{
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 18px;
        }

        .feature-card{
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 22px;
            text-align: center;
            color: white;
            transition: 0.3s;
        }

        .feature-card:hover{
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
        }

        .feature-card i{
            font-size: 28px;
            margin-bottom: 12px;

            background: linear-gradient(to right, #60a5fa, #a78bfa);

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feature-title{
            font-size: 15px;
            font-weight: 600;
        }

        /* Responsive */

        @media(max-width: 768px){

            .main-card{
                padding: 30px;
            }

            .title{
                font-size: 38px;
            }

            .features{
                grid-template-columns: 1fr;
            }

            .qr-box img{
                width: 220px;
            }

        }

    </style>
</head>
<body>

<!-- Blobs -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="main-card">

    <div class="badge-top">
        🚀 Next Generation QR Generator
    </div>

    <div class="title">
        Smart QR
    </div>

    <div class="subtitle">
        Create stunning QR codes with modern glassmorphism UI
    </div>

    <form method="POST">

        {% csrf_token %}

        <div class="input-group-custom">

            <i class="fa-solid fa-link input-icon"></i>

            <input
                    id="qrInput"
                    type="text"
                    name="qr_text"
                    class="form-control"
                    placeholder="Enter URL or text..."
                    required
            >

        </div>

        <button class="btn-custom generate-btn">
            <i class="fa-solid fa-bolt"></i>
            Generate QR Code
        </button>

        <button type="button"
                class="btn-custom copy-btn"
                onclick="copyText()">

            <i class="fa-solid fa-copy"></i>
            Copy Text

        </button>

    </form>

    {% if qr %}

        <div class="qr-box">

            <div class="qr-wrapper">

                <img src="{{ qr }}" alt="QR Code">

            </div>

            <a href="{{ qr }}" download class="download-btn">

                <i class="fa-solid fa-download"></i>
                Download QR

            </a>

        </div>

    {% endif %}

    <div class="features">

        <div class="feature-card">

            <i class="fa-solid fa-qrcode"></i>

            <div class="feature-title">
                Instant QR
            </div>

        </div>

        <div class="feature-card">

            <i class="fa-solid fa-shield-halved"></i>

            <div class="feature-title">
                Secure Generation
            </div>

        </div>

        <div class="feature-card">

            <i class="fa-solid fa-cloud-arrow-down"></i>

            <div class="feature-title">
                Fast Download
            </div>

        </div>

    </div>

</div>

<script>

    function copyText(){

        let input = document.getElementById("qrInput");

        navigator.clipboard.writeText(input.value);

        alert("Text Copied Successfully 🚀");

    }

</script>

</body>
</html>
